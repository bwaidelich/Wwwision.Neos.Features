Wwwision\Neos\Features\Adapter\FeatureProviderFromSettings:
  arguments:
    1:
      setting: Wwwision.Neos.Features.features
    2:
      setting: Wwwision.Neos.Features.featureGroups

Wwwision\Neos\Features\Adapter\ForStoringFeatureStatesViaYaml:
  arguments:
    1:
      setting: Wwwision.Neos.Features.states.path

Wwwision\Neos\Features\Factory\FeatureContextFactory:
  arguments:
    1:
      setting: Wwwision.Neos.Features.configurationFiles.settings.path
    2:
      setting: Wwwision.Neos.Features.configurationFiles.nodeTypes.path
    3:
      setting: Neos.Flow

Wwwision\Neos\Features\Model\FeatureImplementation\FeatureContext:
  scope: singleton
  factoryObjectName: Wwwision\Neos\Features\Factory\FeatureContextFactory

Wwwision\Neos\Features\FeatureSystem:
  scope: singleton
  factoryObjectName: Wwwision\Neos\Features\Factory\FeatureSystemFactory
